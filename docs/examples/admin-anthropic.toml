# OmniShell — Admin profile with Anthropic
#
# Full access, technical LLM assistant.

default_profile = "admin"

[llm]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
temperature = 0.7
max_tokens = 4096
timeout_secs = 60

[profile.admin]
mode = "admin"

# Optional: even admins can't format disks
[acl]
extra_block = ["format", "fdisk", "mkfs"]

[profile.agent]
mode = "agent"

[profile.agent.llm]
provider = "openai"
model = "gpt-4o"
