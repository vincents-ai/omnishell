# OmniShell — Agent profile with OpenAI
#
# For AI agent loops: JSON output, blocklist-only ACL, structured LLM.

default_profile = "agent"

[llm]
provider = "openai"
model = "gpt-4o"
temperature = 0.7
max_tokens = 1024

[profile.agent]
mode = "agent"

[profile.agent.llm]
model = "gpt-4o"
temperature = 0.5
max_tokens = 2048

# Block additional dangerous commands beyond defaults
[profile.agent.acl]
extra_block = ["curl", "wget"]

[profile.admin]
mode = "admin"

[profile.kids]
mode = "kids"
age = 7
