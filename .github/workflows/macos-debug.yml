name: macOS Debug Build

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  debug-macos:
    name: Debug macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust version
        run: rustc --version && cargo --version

      - name: Check cargo check (debug, with --target)
        run: cargo check --target ${{ matrix.target }} 2>&1; echo "EXIT=$?"

      - name: Check cargo check (debug, without --target)
        run: cargo check 2>&1; echo "EXIT=$?"

      - name: Build release (with --target)
        run: cargo build --release --target ${{ matrix.target }} 2>&1; echo "EXIT=$?"
